# Inspired by the config used for official live media

set default=1

if [ "$grub_platform" == "efi" ]; then
	function load_video {
		insmod efi_gop
		insmod efi_uga
		insmod video_bochs
		insmod video_cirrus
		insmod all_video
	}
	set basicgfx="nomodeset"
else
	function load_video {
		insmod all_video
	}
	set basicgfx="nomodeset vga=791"
fi

load_video
set gfxpayload=keep
insmod gzio
insmod part_gpt
insmod ext2

terminal_input console
terminal_output console

set timeout=60
set timeout_style=menu

search --file --set=root /boot/0x017a5f23

menuentry "Start CentOS-Stream-Image-MATE-Live" --class fedora --class gnu-linux --class gnu --class os {
	linux ($root)/boot/x86_64/loader/linux quiet rhgb  root=live:CDLABEL=CentOS_AltImage rd.live.image
	initrd ($root)/boot/x86_64/loader/initrd
}
menuentry "Test this media & start CentOS-Stream-Image-MATE-Live" --class fedora --class gnu-linux --class gnu --class os {
	linux ($root)/boot/x86_64/loader/linux quiet rhgb  root=live:CDLABEL=CentOS_AltImage rd.live.image rd.live.check
	initrd ($root)/boot/x86_64/loader/initrd
}
submenu "Troubleshooting -->" {
	menuentry "Start CentOS-Stream-Image-MATE-Live in basic graphics mode" --class fedora --class gnu-linux --class gnu --class os {
		linux ($root)/boot/x86_64/loader/linux quiet rhgb  root=live:CDLABEL=CentOS_AltImage rd.live.image ${basicgfx}
		initrd ($root)/boot/x86_64/loader/initrd
	}
}
