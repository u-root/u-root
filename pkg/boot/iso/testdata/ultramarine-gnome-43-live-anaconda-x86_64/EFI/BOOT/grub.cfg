#
# /boot/grub/grub.cfg: Grub configurations
# Automatically generated by Katsu Image Builder. See
# katsu::builder::Bootloader::cp_grub for more information.



set default="0"

function load_video {
  insmod all_video
}

load_video
set gfxpayload=keep
insmod gzio
insmod part_gpt
insmod ext2
insmod chain
set timeout=60

search --no-floppy --set=root --label 'UM-Gn-Live-Anaconda'
menuentry 'Ultramarine GNOME 43' --class gnu-linux --class gnu --class os {
	linux /boot/vmlinuz root=live:CDLABEL=UM-Gn-Live-Anaconda rd.live.image enforcing=0 quiet rhgb
	initrd /boot/initramfs.img
}

menuentry 'Ultramarine GNOME 43 (Check Image)' --class gnu-linux --class gnu --class os {
	linux /boot/vmlinuz root=live:CDLABEL=UM-Gn-Live-Anaconda rd.live.image rd.live.check enforcing=0 quiet rhgb
	initrd /boot/initramfs.img
}

menuentry 'Ultramarine GNOME 43 (nomodeset)' --class gnu-linux --class gnu --class os {
	linux /boot/vmlinuz root=live:CDLABEL=UM-Gn-Live-Anaconda rd.live.image enforcing=0 nomodeset quiet rhgb
	initrd /boot/initramfs.img
}
