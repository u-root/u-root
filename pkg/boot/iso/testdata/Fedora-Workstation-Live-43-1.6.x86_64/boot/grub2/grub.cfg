# Inspired by the config used for lorax-built live media

set default="1"

if [ "$grub_platform" == "efi" ]; then
	function load_video {
		insmod efi_gop
		insmod efi_uga
		insmod video_bochs
		insmod video_cirrus
		insmod all_video
	}
	set basicgfx="nomodeset"
else
	function load_video {
		insmod all_video
	}
	set basicgfx="nomodeset vga=791"
fi

load_video
set gfxpayload=keep
insmod gzio
insmod part_gpt
insmod ext2

terminal_input console
terminal_output console

set timeout=10
set timeout_style=menu

search --file --set=root /boot/0x4da30161

menuentry "Start Fedora-Workstation-Live" --class fedora --class gnu-linux --class gnu --class os {
	linux ($root)/boot/x86_64/loader/linux quiet rhgb  root=live:CDLABEL=Fedora-WS-Live-43 rd.live.image
	initrd ($root)/boot/x86_64/loader/initrd
}
menuentry "Test this media & start Fedora-Workstation-Live" --class fedora --class gnu-linux --class gnu --class os {
	linux ($root)/boot/x86_64/loader/linux quiet rhgb  root=live:CDLABEL=Fedora-WS-Live-43 rd.live.image rd.live.check
	initrd ($root)/boot/x86_64/loader/initrd
}
submenu "Troubleshooting -->" {
	menuentry "Start Fedora-Workstation-Live in basic graphics mode" --class fedora --class gnu-linux --class gnu --class os {
		linux ($root)/boot/x86_64/loader/linux quiet rhgb  root=live:CDLABEL=Fedora-WS-Live-43 rd.live.image ${basicgfx}
		initrd ($root)/boot/x86_64/loader/initrd
	}
}
